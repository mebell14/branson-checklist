    }

      top: 0; left: 0; right: 0;
      height: 5px;

    header h1 {

      font-size: 2.4rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .progress-bar-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      height: 8px;
      width: 280px;
      margin: 1.2rem auto 0;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 0.78rem;
      color: var(--gold);
      margin-top: 0.4rem;
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.25rem 1rem;
      background: var(--white);
      border-bottom: 1px solid #E5E0D8;
      flex-wrap: wrap;
    }

    .controls button {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1.5px solid var(--navy);
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }

    .controls button:hover {
      background: var(--navy);
      color: var(--white);
    }

    .controls button.danger {
      border-color: var(--red);
      color: var(--red);
    }

    .controls button.danger:hover {
      background: var(--red);
      color: var(--white);
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    .section {
      margin-bottom: 2rem;
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--light-gray);
    }

    .section-header:hover {
      background: var(--light-gray);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
      font-size: 1rem;
    }

    .section-emoji {
      font-size: 1.2rem;
    }

    .section-badge {
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--light-gray);
      color: var(--mid-gray);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    .section-badge.complete {
      background: #E8F5E9;
      color: #388E3C;
    }

    .chevron {
      font-size: 0.75rem;
      color: var(--mid-gray);
      transition: transform 0.2s;
    }

    .section.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .section-body {
      padding: 0.5rem 0;
    }

    .section.collapsed .section-body {
      display: none;
    }

    .subsection-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid-gray);
      padding: 0.75rem 1.25rem 0.3rem;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.55rem 1.25rem;
      transition: background 0.1s;
      cursor: pointer;
    }

    .item:hover {
      background: var(--light-gray);
    }

    .item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: var(--navy);
      cursor: pointer;
    }

    .item label {
      font-size: 0.9rem;
      line-height: 1.4;
      cursor: pointer;
      transition: color 0.2s;
    }

    .item.checked label {
      color: var(--done-text);
      text-decoration: line-through;
    }

    .note {
      font-size: 0.78rem;
      color: var(--mid-gray);
      font-style: italic;
      padding: 0.25rem 1.25rem 0.5rem 3.25rem;
    }

    .todo-section .item label {
      font-weight: 500;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      .controls { gap: 0.5rem; }
    }
  </style>
</head>

        label: "Coffee Station ☕",
        items: [
          { text: "Espresso machine" },
          { text: "Coffee beans" },
          { text: "Cups / lids / straws" },
          { text: "Frother" },
          { text: "Syrups" },
        ]
      },
      {
        label: "Adults",
        items: [
          { text: "Fan for the bedroom" },
          { text: "Phone chargers — everyone" },
          { text: "Portable charger / power bank" },
          { text: "Camera or GoPro" },
          { text: "Cash — food trucks Saturday + general spending" },
          { text: "Daily medications & vitamins" },
          { text: "ID & insurance cards" },
          { text: "Phone mount or way to prop phone for pool photos" },
          { text: "Swimsuit cover-up or easy poolside outfit" },
        ]
      }
    ]
  }
];

function buildChecklist() {
  const main = document.getElementById('checklist');
  main.innerHTML = '';

  data.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.dataset.id = section.id;

    const allItems = getAllItems(section);
    const checkedCount = allItems.filter(k => localStorage.getItem(k) === 'true').length;
    const isComplete = allItems.length > 0 && checkedCount === allItems.length;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <div class="section-title">
        <span class="section-emoji">${section.emoji}</span>
        <span>${section.title}</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <span class="section-badge ${isComplete ? 'complete' : ''}">${checkedCount}/${allItems.length}</span>
        <span class="chevron">▼</span>
      </div>
    `;
    header.addEventListener('click', () => {
      sec.classList.toggle('collapsed');
    });

    const body = document.createElement('div');
    body.className = 'section-body';

    if (section.items) {
      section.items.forEach(item => {
        body.appendChild(buildItem(section.id, item));
      });
    }

    if (section.subsections) {
      section.subsections.forEach(sub => {
        const label = document.createElement('div');
        label.className = 'subsection-label';
        label.textContent = sub.label;
        body.appendChild(label);
        sub.items.forEach(item => {
          body.appendChild(buildItem(section.id + '_' + sub.label.replace(/\s+/g,'_'), item));
        });
      });
    }

    sec.appendChild(header);
    sec.appendChild(body);
    main.appendChild(sec);
  });

  updateProgress();
}

function buildItem(prefix, item) {
  const key = prefix + '::' + item.text;
  const checked = localStorage.getItem(key) === 'true';

  const div = document.createElement('div');
  div.className = 'item' + (checked ? ' checked' : '');

  const id = 'cb_' + Math.random().toString(36).slice(2);
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.id = id;
  cb.checked = checked;

  const lbl = document.createElement('label');
  lbl.htmlFor = id;
  lbl.textContent = item.text;

  cb.addEventListener('change', () => {
    localStorage.setItem(key, cb.checked);
    div.classList.toggle('checked', cb.checked);
    buildChecklist();
  });

  div.addEventListener('click', e => {
    if (e.target !== cb) cb.click();
  });

  div.appendChild(cb);
  div.appendChild(lbl);

  if (item.note) {
    const note = document.createElement('div');
    note.className = 'note';
    note.textContent = '💡 ' + item.note;
    // append note after the item row
    div.appendChild(document.createElement('br'));
    const noteRow = document.createElement('div');
    noteRow.className = 'note';
    noteRow.textContent = '💡 ' + item.note;
    div.appendChild(noteRow);
  }

  return div;
}

function getAllItems(section) {
  const keys = [];
  const prefix = section.id;
  if (section.items) {
    section.items.forEach(item => keys.push(prefix + '::' + item.text));
  }
  if (section.subsections) {
    section.subsections.forEach(sub => {
      const subPrefix = prefix + '_' + sub.label.replace(/\s+/g,'_');
      sub.items.forEach(item => keys.push(subPrefix + '::' + item.text));
    });
  }
  return keys;
}

function updateProgress() {
  let total = 0, checked = 0;
  data.forEach(section => {
    const keys = getAllItems(section);
    total += keys.length;
    checked += keys.filter(k => localStorage.getItem(k) === 'true').length;
  });
  const pct = total === 0 ? 0 : Math.round((checked / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${checked} of ${total} checked`;
}

function expandAll() {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('collapsed'));
}
function collapseAll() {
  document.querySelectorAll('.section').forEach(s => s.classList.add('collapsed'));
}
function checkAll() {
  data.forEach(section => {
    getAllItems(section).forEach(k => localStorage.setItem(k, 'true'));
  });
  buildChecklist();
}
function clearAll() {
  if (!confirm('Clear all checkmarks?')) return;
  data.forEach(section => {
    getAllItems(section).forEach(k => localStorage.removeItem(k));
  });
  buildChecklist();
}

buildChecklist();
</script>
</body>
</html>
